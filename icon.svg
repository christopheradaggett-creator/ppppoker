<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="80" fill="#071a13"/>
  <!-- Subtle grid texture -->
  <rect width="512" height="512" rx="80" fill="url(#grid)" opacity="0.04"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
    </pattern>
    <!-- Gold glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>

  <!-- Red chip — back left -->
  <circle cx="210" cy="315" r="124" fill="#6B1111"/>
  <circle cx="210" cy="315" r="124" fill="none" stroke="#c0392b" stroke-width="3"/>
  <circle cx="210" cy="315" r="106" fill="none" stroke="#e05444" stroke-width="18" stroke-dasharray="20 13"/>
  <circle cx="210" cy="315" r="90" fill="#6B1111"/>

  <!-- Blue chip — back right -->
  <circle cx="305" cy="315" r="124" fill="#112040"/>
  <circle cx="305" cy="315" r="124" fill="none" stroke="#1a3a7a" stroke-width="3"/>
  <circle cx="305" cy="315" r="106" fill="none" stroke="#4a6fd4" stroke-width="18" stroke-dasharray="20 13"/>
  <circle cx="305" cy="315" r="90" fill="#112040"/>

  <!-- Gold chip — front center -->
  <circle cx="256" cy="228" r="140" fill="#2a1c02"/>
  <circle cx="256" cy="228" r="140" fill="none" stroke="#c9a84c" stroke-width="4"/>
  <circle cx="256" cy="228" r="120" fill="none" stroke="#e8c97a" stroke-width="22" stroke-dasharray="24 15"/>
  <circle cx="256" cy="228" r="100" fill="#2a1c02"/>
  <circle cx="256" cy="228" r="100" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>

  <!-- P monogram -->
  <text x="256" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="110" font-weight="700" fill="#c9a84c" dominant-baseline="middle">P</text>

  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="79" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.3"/>
</svg>
